<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="2; url=/warehouse.html" />
    <title>Patrick Tech Shop</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #0f172a;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 34px;
        border: 1px solid #d8e2f0;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 22px;
        color: #516178;
        font-size: 16px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Patrick Tech Shop</h1>
      <p>Đang mở trang quản lý kho. Nếu trình duyệt không tự chuyển, bấm nút bên dưới.</p>
      <a href="/warehouse.html">Mở kho tài khoản</a>
    </main>
  </body>
</html>
