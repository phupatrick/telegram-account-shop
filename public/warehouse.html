<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Patrick Tech Shop - Kho tài khoản</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --ink: #111827;
        --muted: #64748b;
        --line: #d9e2ef;
        --blue: #155eef;
        --green: #11843b;
        --orange: #ea580c;
        --red: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 24px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      h1 { margin: 0; font-size: 22px; }
      button, input, textarea, select {
        font: inherit;
      }
      button {
        border: 0;
        background: var(--blue);
        color: white;
        padding: 9px 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
      }
      button.secondary { background: #e2e8f0; color: #0f172a; }
      button.danger { background: var(--red); }
      main {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 16px;
        padding: 16px;
      }
      section, .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      section { padding: 14px; }
      h2 { margin: 0 0 12px; font-size: 16px; }
      .stack { display: grid; gap: 12px; }
      .field { display: grid; gap: 5px; }
      label { color: var(--muted); font-size: 12px; font-weight: 700; }
      input, textarea, select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px 10px;
        background: #fff;
      }
      textarea { min-height: 110px; resize: vertical; }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }
      .metric {
        padding: 14px;
        border-left: 4px solid var(--blue);
      }
      .metric strong { display: block; font-size: 24px; }
      .metric span { color: var(--muted); font-size: 12px; font-weight: 700; }
      .tabs {
        display: flex;
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }
      .tabs button {
        background: #edf2f7;
        color: #0f172a;
      }
      .tabs button.active {
        background: var(--blue);
        color: #fff;
      }
      .tab { display: none; padding: 12px; overflow-x: auto; }
      .tab.active { display: block; }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th, td {
        text-align: left;
        padding: 9px 8px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      th {
        color: #334155;
        background: #f8fafc;
        position: sticky;
        top: 72px;
      }
      .badge {
        display: inline-block;
        padding: 3px 7px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        background: #e2e8f0;
      }
      .badge.ok { background: #dcfce7; color: #166534; }
      .badge.warn { background: #ffedd5; color: #9a3412; }
      .badge.bad { background: #fee2e2; color: #991b1b; }
      .auth {
        max-width: 520px;
        margin: 12vh auto;
        padding: 24px;
      }
      .hidden { display: none; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .muted { color: var(--muted); }
      .helper {
        display: grid;
        gap: 14px;
        max-width: 920px;
      }
      .helper pre {
        margin: 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f8fafc;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }
      .helper a {
        color: var(--blue);
        font-weight: 800;
      }
      @media (max-width: 980px) {
        main { grid-template-columns: 1fr; }
        .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="auth" class="auth panel">
      <h1>Kho tài khoản Patrick Tech Shop</h1>
      <p class="muted">Đăng nhập bằng Gmail quản trị hoặc Google.</p>
      <div class="field">
        <label>Email</label>
        <input id="emailInput" type="email" placeholder="admin@gmail.com" autocomplete="username" />
      </div>
      <div class="field">
        <label>Mật khẩu</label>
        <input id="passwordInput" type="password" placeholder="Mật khẩu quản trị" autocomplete="current-password" />
      </div>
      <p class="actions">
        <button id="loginPassword">Đăng nhập</button>
      </p>
      <div id="googleButton"></div>
      <p id="googleHint" class="muted"></p>
    </div>

    <div id="app" class="hidden">
      <header>
        <div>
          <h1>Kho tài khoản số</h1>
          <div class="muted">Danh mục -> Sản phẩm -> Biến thể -> Tài khoản</div>
        </div>
        <div class="actions">
          <button class="secondary" id="refresh">Làm mới</button>
          <button class="danger" id="logout">Đăng xuất</button>
        </div>
      </header>

      <main>
        <aside class="stack">
          <section>
            <h2>Thêm danh mục</h2>
            <div class="stack">
              <div class="field"><label>Tên</label><input id="categoryName" placeholder="ChatGPT, Gemini, Claude..." /></div>
              <div class="field"><label>Mô tả</label><input id="categoryDescription" placeholder="Nhóm tài khoản AI" /></div>
              <button data-action="category">Lưu danh mục</button>
            </div>
          </section>

          <section>
            <h2>Thêm sản phẩm / gói</h2>
            <div class="stack">
              <div class="field"><label>Danh mục</label><select id="productCategory"></select></div>
              <div class="field"><label>Tên gói</label><input id="productName" placeholder="ChatGPT Plus" /></div>
              <div class="field"><label>Giá</label><input id="productPrice" type="number" placeholder="100000" /></div>
              <div class="field"><label>Mô tả hiện trên bot</label><textarea id="productDescription" placeholder="BH 10 ngày, Outlook/Gmail..."></textarea></div>
              <button data-action="product">Lưu sản phẩm</button>
            </div>
          </section>

          <section>
            <h2>Thêm biến thể</h2>
            <div class="stack">
              <div class="field"><label>Sản phẩm</label><select id="variantProduct"></select></div>
              <div class="field"><label>Tên biến thể</label><input id="variantName" placeholder="BH 10 ngày - Gmail" /></div>
              <div class="field"><label>Số ngày bảo hành</label><input id="variantWarranty" type="number" value="0" /></div>
              <div class="field"><label>Loại mail</label><input id="variantMail" placeholder="random / outlook / gmail" /></div>
              <button data-action="variant">Lưu biến thể</button>
            </div>
          </section>

          <section>
            <h2>Nhập kho tài khoản</h2>
            <div class="stack">
              <div class="field"><label>Sản phẩm</label><select id="accountProduct"></select></div>
              <div class="field"><label>Biến thể</label><select id="accountVariant"></select></div>
              <div class="field"><label>Ghi chú</label><input id="accountNote" placeholder="Lô nhập ngày hôm nay" /></div>
              <div class="field"><label>Mỗi dòng một tài khoản</label><textarea id="accountLines" placeholder="user1|pass1&#10;user2|pass2"></textarea></div>
              <button data-action="accounts">Nhập kho</button>
            </div>
          </section>

          <section>
            <h2>Thêm quản trị viên</h2>
            <div class="stack">
              <div class="field"><label>Email</label><input id="adminEmail" placeholder="admin@gmail.com" /></div>
              <div class="field"><label>Vai trò</label><input id="adminRole" value="admin" /></div>
              <button data-action="admin">Lưu admin</button>
            </div>
          </section>
        </aside>

        <div>
          <div class="grid">
            <section class="metric"><span>Danh mục</span><strong id="mCategories">0</strong></section>
            <section class="metric"><span>Sản phẩm</span><strong id="mProducts">0</strong></section>
            <section class="metric"><span>Tài khoản còn</span><strong id="mAvailable">0</strong></section>
            <section class="metric"><span>Đơn gần đây</span><strong id="mOrders">0</strong></section>
            <section class="metric"><span>Quản trị viên</span><strong id="mAdmins">0</strong></section>
          </div>

          <div class="panel">
            <div class="tabs">
              <button class="active" data-tab="products">Sản phẩm</button>
              <button data-tab="variants">Biến thể</button>
              <button data-tab="accounts">Kho tài khoản</button>
              <button data-tab="intake">Bot nhập hàng</button>
              <button data-tab="orders">Đơn hàng</button>
              <button data-tab="logs">Lịch sử</button>
              <button data-tab="admins">Quản trị</button>
            </div>
            <div id="tab-products" class="tab active"></div>
            <div id="tab-variants" class="tab"></div>
            <div id="tab-accounts" class="tab"></div>
            <div id="tab-intake" class="tab"></div>
            <div id="tab-orders" class="tab"></div>
            <div id="tab-logs" class="tab"></div>
            <div id="tab-admins" class="tab"></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let state = { categories: [], products: [], variants: [], accounts: [], orders: [], logs: [], admins: [], drafts: [] };
      const tokenKey = "warehouse_session_token";
      const $ = (id) => document.getElementById(id);

      function token() { return localStorage.getItem(tokenKey) || ""; }

      async function api(action, payload) {
        const options = action
          ? { method: "POST", headers: { "content-type": "application/json", authorization: `Bearer ${token()}` }, body: JSON.stringify({ action, payload }) }
          : { headers: { authorization: `Bearer ${token()}` } };
        const response = await fetch("/api/warehouse", options);
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "Có lỗi xảy ra");
        return data.data;
      }

      async function load() {
        state = await api();
        render();
      }

      function render() {
        $("auth").classList.add("hidden");
        $("app").classList.remove("hidden");
        $("mCategories").textContent = state.categories.length;
        $("mProducts").textContent = state.products.length;
        $("mAvailable").textContent = state.products.reduce((sum, p) => sum + Number(p.available_count || 0), 0);
        $("mOrders").textContent = state.orders.length;
        $("mAdmins").textContent = state.admins.length;
        renderSelects();
        renderTables();
      }

      function renderSelects() {
        fillSelect($("productCategory"), state.categories, "Không chọn danh mục");
        fillSelect($("variantProduct"), state.products, "Chọn sản phẩm");
        fillSelect($("accountProduct"), state.products, "Chọn sản phẩm");
        fillSelect($("accountVariant"), state.variants, "Không chọn biến thể");
      }

      function fillSelect(select, rows, empty) {
        const current = select.value;
        select.innerHTML = `<option value="">${empty}</option>` + rows.map((row) => `<option value="${row.id}">#${row.id} ${escapeHtml(row.name)}</option>`).join("");
        select.value = current;
      }

      function renderTables() {
        $("tab-products").innerHTML = table(["ID", "Danh mục", "Tên", "Giá", "Còn", "Đã bán", "Trạng thái"], state.products.map((p) => [
          p.id,
          p.category_name || "-",
          p.name,
          money(p.price),
          badge(p.available_count, "ok"),
          p.sold_count,
          p.is_active ? badge("Đang bán", "ok") : badge("Tắt", "bad")
        ]));
        $("tab-variants").innerHTML = table(["ID", "Sản phẩm", "Biến thể", "BH", "Mail", "Còn", "Đã bán"], state.variants.map((v) => [
          v.id, v.product_name, v.name, `${v.warranty_days} ngày`, v.mail_type, badge(v.available_count, "ok"), v.sold_count
        ]));
        $("tab-accounts").innerHTML = table(["ID", "Sản phẩm", "Biến thể", "Preview", "Trạng thái", "Ghi chú", "Ngày nhập"], state.accounts.map((a) => [
          a.id, a.product_name, a.variant_name || "-", a.preview, statusBadge(a.status), a.note || "", date(a.created_at)
        ]));
        $("tab-intake").innerHTML = renderIntakeHelper();
        $("tab-orders").innerHTML = table(["Mã", "User", "Sản phẩm", "Số tiền", "Trạng thái", "Ngày tạo"], state.orders.map((o) => [
          o.code, o.username ? `@${o.username}` : o.telegram_id, o.product_name, money(o.amount), statusBadge(o.status), date(o.created_at)
        ]));
        $("tab-logs").innerHTML = table(["ID", "Sự kiện", "Payload", "Thời gian"], state.logs.map((l) => [
          l.id, l.event, `<code>${escapeHtml(JSON.stringify(l.payload))}</code>`, date(l.created_at)
        ]));
        $("tab-admins").innerHTML = table(["ID", "Email", "Vai trò", "Trạng thái", "Ngày tạo"], state.admins.map((admin) => [
          admin.id, admin.email, admin.role, admin.is_active ? badge("active", "ok") : badge("off", "bad"), date(admin.created_at)
        ]));
      }

      function renderIntakeHelper() {
        const draftRows = (state.drafts || []).map((draft) => {
          const parsed = draft.parsed || {};
          const groups = parsed.groups || [];
          const unclassified = parsed.unclassified || [];
          const groupText = groups.length
            ? groups.map((group) => `${escapeHtml(group.product_name)}${group.variant_name ? " / " + escapeHtml(group.variant_name) : ""}: ${group.lines?.length || 0}`).join("<br>")
            : "-";
          return [
            draft.id,
            draft.telegram_id,
            groupText,
            unclassified.length,
            statusBadge(draft.status),
            date(draft.created_at),
            date(draft.reviewed_at)
          ];
        });

        return `
          <div class="helper">
            <section>
              <h2>Bot hỗ trợ nhập hàng</h2>
              <p class="muted">Bot nằm trong Telegram: mở <a href="https://t.me/patrick_tech_shop_bot" target="_blank" rel="noreferrer">@patrick_tech_shop_bot</a>, vào /admin rồi bấm "Trợ lý nhập kho", hoặc gửi thẳng mẫu bên dưới.</p>
              <pre>/nhapkho
ChatGPT Plus BH 10 ngày Gmail
email1@gmail.com|pass1
email2@gmail.com|pass2</pre>
              <p class="muted">Bot sẽ tự phân loại theo sản phẩm/biến thể trong kho, tạo nháp và đưa nút "Duyệt nhập kho" trên Telegram. Chỉ sau khi admin duyệt, tài khoản mới được nhập vào kho thật.</p>
            </section>
            <section>
              <h2>Nháp nhập hàng gần đây</h2>
              ${table(["ID", "Admin Telegram", "Phân loại", "Chưa nhận diện", "Trạng thái", "Tạo lúc", "Duyệt lúc"], draftRows)}
            </section>
          </div>
        `;
      }

      function table(headers, rows) {
        return `<table><thead><tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell ?? ""}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }
      function badge(value, type) { return `<span class="badge ${type || ""}">${value}</span>`; }
      function statusBadge(status) {
        const type = status === "available" || status === "delivered" ? "ok" : status === "pending" || status === "reserved" ? "warn" : "bad";
        return badge(status, type);
      }
      function money(value) { return Number(value || 0).toLocaleString("vi-VN") + "đ"; }
      function date(value) { return value ? new Date(value).toLocaleString("vi-VN") : ""; }
      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" })[char]);
      }

      $("loginPassword").onclick = async () => {
        try {
          const response = await fetch("/api/warehouse-auth", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              provider: "password",
              email: $("emailInput").value.trim(),
              password: $("passwordInput").value
            })
          });
          const result = await response.json();
          if (!result.ok) throw new Error(result.error || "Đăng nhập thất bại");
          localStorage.setItem(tokenKey, result.data.token);
          await load();
        } catch (error) {
          alert(error.message);
        }
      };
      $("logout").onclick = () => { localStorage.removeItem(tokenKey); location.reload(); };
      $("refresh").onclick = () => load().catch((error) => alert(error.message));
      document.querySelectorAll("[data-tab]").forEach((button) => {
        button.onclick = () => {
          document.querySelectorAll("[data-tab]").forEach((item) => item.classList.remove("active"));
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          $("tab-" + button.dataset.tab).classList.add("active");
        };
      });
      document.querySelector("[data-action='category']").onclick = async () => {
        await api("create_category", { name: $("categoryName").value, description: $("categoryDescription").value });
        $("categoryName").value = ""; $("categoryDescription").value = "";
        await load();
      };
      document.querySelector("[data-action='product']").onclick = async () => {
        await api("create_product", { category_id: $("productCategory").value, name: $("productName").value, price: $("productPrice").value, description: $("productDescription").value });
        $("productName").value = ""; $("productPrice").value = ""; $("productDescription").value = "";
        await load();
      };
      document.querySelector("[data-action='variant']").onclick = async () => {
        await api("create_variant", { product_id: $("variantProduct").value, name: $("variantName").value, warranty_days: $("variantWarranty").value, mail_type: $("variantMail").value });
        $("variantName").value = ""; $("variantWarranty").value = "0"; $("variantMail").value = "";
        await load();
      };
      document.querySelector("[data-action='accounts']").onclick = async () => {
        await api("import_accounts", { product_id: $("accountProduct").value, variant_id: $("accountVariant").value, lines: $("accountLines").value, note: $("accountNote").value });
        $("accountLines").value = "";
        await load();
      };
      document.querySelector("[data-action='admin']").onclick = async () => {
        await api("create_admin", { email: $("adminEmail").value, role: $("adminRole").value });
        $("adminEmail").value = "";
        $("adminRole").value = "admin";
        await load();
      };

      async function setupGoogleLogin() {
        const response = await fetch("/api/warehouse-auth", { headers: { authorization: `Bearer ${token()}` } });
        const result = await response.json();
        const clientId = result.data?.googleClientId;
        if (!clientId) {
          $("googleHint").textContent = "Google login chưa bật: cần cấu hình GOOGLE_CLIENT_ID trên Vercel. Email + mật khẩu đã dùng được.";
          $("loginGoogle").disabled = true;
          return;
        }

        const script = document.createElement("script");
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.onload = () => {
          google.accounts.id.initialize({
            client_id: clientId,
            callback: async (credentialResponse) => {
              const login = await fetch("/api/warehouse-auth", {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ provider: "google", idToken: credentialResponse.credential })
              });
              const data = await login.json();
              if (!data.ok) {
                alert(data.error || "Google login thất bại");
                return;
              }
              localStorage.setItem(tokenKey, data.data.token);
              await load();
            }
          });
          google.accounts.id.renderButton($("googleButton"), {
            theme: "outline",
            size: "large",
            text: "signin_with",
            shape: "rectangular",
            width: 320
          });
        };
        document.head.appendChild(script);
      }

      setupGoogleLogin();

      if (token()) {
        load().catch(() => {
          localStorage.removeItem(tokenKey);
          $("auth").classList.remove("hidden");
        });
      }
    </script>
  </body>
</html>
